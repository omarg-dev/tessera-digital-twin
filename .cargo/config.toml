[source.crates-io]
replace-with = 'rsproxy-sparse'

[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"

[registries.rsproxy]
index = "https://rsproxy.cn/crates.io-index"

# Use the faster LLD linker
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# dev aliases
# usage: cargo build -p <crate> && cargo notify
[alias]
notify = "run -q -p notifier"